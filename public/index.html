<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Micas Scan Station</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="scanner-panel" aria-labelledby="page-title">
        <div class="topbar">
          <div>
            <p class="eyebrow">Micas Networks</p>
            <h1 id="page-title">Switch Scan Station</h1>
          </div>
          <span class="status-pill" id="supportStatus">Photo mode</span>
        </div>

        <div class="photo-frame">
          <img id="photoPreview" alt="Selected inventory label preview">
          <div class="photo-placeholder" id="photoPlaceholder">
            <strong>Ready</strong>
            <span>Photograph the switch label.</span>
          </div>
        </div>

        <div class="photo-actions">
          <label class="file-button" for="labelPhoto">Scan Label</label>
          <input id="labelPhoto" type="file" accept="image/*" capture="environment">
          <button class="primary-button hidden" id="extractPhoto" type="button" disabled>Retry OCR</button>
        </div>

        <form id="scanForm" class="scan-form">
          <label>
            Model number
            <input id="modelNumber" name="modelNumber" autocomplete="off" placeholder="Example: Z9432F-ON">
          </label>

          <label>
            Serial number
            <input id="serialNumber" name="serialNumber" autocomplete="off" placeholder="Example: GT8F05962167C">
          </label>

          <div class="form-status" id="formStatus" role="status">Scan or enter both fields before submitting.</div>

          <button class="submit-button" id="submitScan" type="submit" disabled>Save Scan</button>
        </form>
      </section>

      <section class="history-panel" aria-labelledby="history-title">
        <div class="section-heading">
          <p class="eyebrow">Session</p>
          <h2 id="history-title">Scans</h2>
        </div>
        <ul class="history-list" id="historyList"></ul>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
