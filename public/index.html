<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Micas Scan Station</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <div class="brand-mark">M</div>
          <div>
            <p class="eyebrow">Micas Inventory</p>
            <h1 id="page-title">Switch Scan Station</h1>
          </div>
        </div>
        <span class="status-pill" id="supportStatus">Ready</span>
      </header>

      <section class="scanner-panel" aria-labelledby="page-title">
        <div class="panel-heading">
          <h2>Scan label</h2>
          <div class="scan-options" aria-label="Scan options">
            <label class="toggle-control">
              <input id="rapidMode" type="checkbox">
              <span>Rapid mode</span>
            </label>
            <label class="toggle-control">
              <input id="sameModel" type="checkbox">
              <span>Lock model</span>
            </label>
            <label class="toggle-control">
              <input id="autoSave" type="checkbox">
              <span>Auto-save</span>
            </label>
          </div>
        </div>

        <div class="station-grid">
          <div>
            <div class="photo-frame">
              <video id="cameraPreview" playsinline muted></video>
              <img id="photoPreview" alt="Selected inventory label preview">
              <div class="photo-placeholder" id="photoPlaceholder">
                <strong>Ready</strong>
                <span>Fill the frame with the model and switch S/N label lines.</span>
              </div>
              <canvas id="captureCanvas" class="hidden"></canvas>
            </div>

            <div class="photo-actions">
              <button class="primary-button" id="openCamera" type="button">Open Camera</button>
              <button class="primary-button hidden" id="capturePhoto" type="button">Take Photo</button>
              <div class="camera-tools hidden" id="cameraTools">
                <label class="zoom-control hidden" id="zoomControl">
                  Zoom
                  <input id="cameraZoom" type="range" min="1" max="1" step="0.1" value="1">
                </label>
                <button class="tool-button hidden" id="toggleTorch" type="button">Light</button>
              </div>
              <label class="file-button" for="labelPhoto">Phone Camera</label>
              <input id="labelPhoto" type="file" accept="image/*" capture="environment">
              <button class="primary-button hidden" id="extractPhoto" type="button" disabled>Retry Scan</button>
            </div>
          </div>

          <form id="scanForm" class="scan-form">
            <div class="progress-wrap" aria-label="Scan progress">
              <div class="progress-track">
                <div class="progress-bar" id="progressBar"></div>
              </div>
            </div>

            <label>
              Model number
              <input id="modelNumber" name="modelNumber" autocomplete="off" placeholder="Example: Z9432F-ON">
            </label>

            <label>
              Serial number
              <input id="serialNumber" name="serialNumber" autocomplete="off" placeholder="Example: GT8F05962167C">
            </label>

            <div class="form-status" id="formStatus" role="status">Take a photo to start.</div>

            <button class="submit-button" id="submitScan" type="submit">Submit to Google Sheets</button>
          </form>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
